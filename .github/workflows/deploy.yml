name: Frontend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: "是否执行部署"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  NODE_VERSION: "20"
  DEPLOY_SSH_CONNECT_TIMEOUT: "30"

jobs:
  ci:
    name: CI Build
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decision.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Prepare Build Env
        shell: bash
        run: |
          if [ -n "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> .env.production.local
            echo "Using VITE_API_BASE_URL from secret."
          else
            echo "VITE_API_BASE_URL secret is empty, using repository .env.production."
          fi

      - name: Type Check + Build
        run: npm run build

      - name: Upload Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error

      - name: Decide Deploy
        id: decision
        shell: bash
        run: |
          SHOULD_DEPLOY="false"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "main" ]]; then
            SHOULD_DEPLOY="true"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.deploy }}" == "true" ]]; then
            SHOULD_DEPLOY="true"
          fi
          echo "should_deploy=$SHOULD_DEPLOY" >> "$GITHUB_OUTPUT"

  cd:
    name: CD Deploy
    needs: ci
    if: needs.ci.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Install SSH Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy Frontend Files
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_PASSWORD" ] || [ -z "$DEPLOY_PORT" ] || [ -z "$DEPLOY_PATH" ]; then
            echo "Missing deploy secrets."
            exit 1
          fi

          export SSHPASS="$DEPLOY_PASSWORD"

          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3"

            if tar -C dist -czf - . | sshpass -e ssh \
              -p "$DEPLOY_PORT" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout="${{ env.DEPLOY_SSH_CONNECT_TIMEOUT }}" \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=3 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "set -euo pipefail; mkdir -p '$DEPLOY_PATH'; rm -rf '$DEPLOY_PATH'/*; tar -xzf - -C '$DEPLOY_PATH'; sudo nginx -t; sudo systemctl reload nginx"; then
              echo "Frontend deploy completed."
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Frontend deploy failed after 3 attempts."
              exit 1
            fi

            echo "SSH deploy failed, retrying in 15 seconds..."
            sleep 15
          done
