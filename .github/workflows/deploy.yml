name: Frontend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: "是否执行部署"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  NODE_VERSION: "20"
  DEPLOY_SSH_CONNECT_TIMEOUT: "30"

jobs:
  ci:
    name: CI Build
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decision.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Prepare Build Env
        shell: bash
        run: |
          if [ -n "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> .env.production.local
            echo "Using VITE_API_BASE_URL from secret."
          else
            echo "VITE_API_BASE_URL secret is empty, using repository .env.production."
          fi

      - name: Type Check + Build
        run: npm run build

      - name: Upload Dist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error

      - name: Decide Deploy
        id: decision
        shell: bash
        run: |
          SHOULD_DEPLOY="false"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "main" ]]; then
            SHOULD_DEPLOY="true"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.deploy }}" == "true" ]]; then
            SHOULD_DEPLOY="true"
          fi
          echo "should_deploy=$SHOULD_DEPLOY" >> "$GITHUB_OUTPUT"

  cd:
    name: CD Deploy
    needs: ci
    if: needs.ci.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Install SSH Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy Frontend Files
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_PASSWORD" ] || [ -z "$DEPLOY_PORT" ] || [ -z "$DEPLOY_PATH" ]; then
            echo "Missing deploy secrets."
            exit 1
          fi

          export SSHPASS="$DEPLOY_PASSWORD"
          tar -C dist -czf frontend-dist.tgz .
          SSH_OPTS=(
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -o ConnectTimeout="${{ env.DEPLOY_SSH_CONNECT_TIMEOUT }}"
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
          )

          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3"
            RELEASE_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}-${GITHUB_SHA::12}"
            REMOTE_ARCHIVE="/tmp/blog-frontend-${RELEASE_ID}.tgz"
            REMOTE_ENV="DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH") ARCHIVE=$(printf '%q' "$REMOTE_ARCHIVE") RELEASE_ID=$(printf '%q' "$RELEASE_ID")"

            if sshpass -e scp -P "$DEPLOY_PORT" "${SSH_OPTS[@]}" frontend-dist.tgz "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_ARCHIVE" \
              && sshpass -e ssh -p "$DEPLOY_PORT" "${SSH_OPTS[@]}" "$DEPLOY_USER@$DEPLOY_HOST" "$REMOTE_ENV bash -s" <<'REMOTE_SCRIPT'
          set -Eeuo pipefail

          deploy_path="${DEPLOY_PATH%/}"
          if [ -z "$deploy_path" ] || [ "$deploy_path" = "/" ]; then
            echo "Invalid DEPLOY_PATH: ${DEPLOY_PATH:-empty}" >&2
            exit 1
          fi
          archive="${ARCHIVE:?}"
          release_id="${RELEASE_ID:?}"
          release_root="${deploy_path}.releases"
          backup_root="${deploy_path}.backups"
          staging="${release_root}/${release_id}"
          backup="${backup_root}/${release_id}"
          backup_file="${backup}/site.tgz"
          owner_group=""
          restore_needed=0

          rollback() {
            local code=$?
            if [ "$restore_needed" -eq 1 ] && [ -f "$backup_file" ]; then
              echo "Deploy failed, rolling back to ${backup_file}"
              rm -rf "$deploy_path"
              mkdir -p "$deploy_path"
              tar -xzf "$backup_file" -C "$deploy_path"
              if [ -n "$owner_group" ]; then
                sudo chown -R "$owner_group" "$deploy_path" || true
              fi
              sudo nginx -t && sudo systemctl reload nginx || true
            else
              echo "Deploy failed before current release was changed; no rollback needed."
            fi
            rm -rf "$staging"
            rm -f "$archive"
            exit "$code"
          }
          trap rollback EXIT

          mkdir -p "$deploy_path" "$release_root" "$backup_root" "$staging" "$backup"
          owner_group="$(stat -c '%U:%G' "$deploy_path" 2>/dev/null || true)"

          tar -xzf "$archive" -C "$staging"

          if find "$deploy_path" -mindepth 1 -maxdepth 1 -print -quit | grep -q .; then
            tar -C "$deploy_path" -czf "$backup_file" .
          fi

          restore_needed=1
          find "$deploy_path" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp -a "$staging"/. "$deploy_path"/
          if [ -n "$owner_group" ]; then
            sudo chown -R "$owner_group" "$deploy_path" || true
          fi

          sudo nginx -t
          sudo systemctl reload nginx

          rm -rf "$staging"
          rm -f "$archive"
          find "$release_root" -mindepth 1 -maxdepth 1 -type d -mtime +7 -exec rm -rf {} + || true
          find "$backup_root" -mindepth 1 -maxdepth 1 -type d -mtime +14 -exec rm -rf {} + || true
          trap - EXIT
          echo "Frontend deploy completed. Backup: ${backup_file}"
          REMOTE_SCRIPT
            then
              echo "Frontend deploy completed."
              exit 0
            fi

            sshpass -e ssh -p "$DEPLOY_PORT" "${SSH_OPTS[@]}" "$DEPLOY_USER@$DEPLOY_HOST" "rm -f '$REMOTE_ARCHIVE'" || true

            if [ "$attempt" -eq 3 ]; then
              echo "Frontend deploy failed after 3 attempts."
              exit 1
            fi

            echo "SSH deploy failed, retrying in 15 seconds..."
            sleep 15
          done
